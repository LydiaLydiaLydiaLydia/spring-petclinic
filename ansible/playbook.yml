---
- name: Configure PetClinic Application Environment
  hosts: app_servers
  # REMOVE THIS LINE: become: yes
  
  vars:
    app_port: 8090
    app_user: jenkins
    app_dir: /var/jenkins_home/petclinic
    
  tasks:
    - name: Ensure application directory exists
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        mode: '0755'
        
    - name: Create logs directory
      file:
        path: /var/jenkins_home/logs
        state: directory
        owner: "{{ app_user }}"
        mode: '0755'
        
    - name: Display configuration summary
      debug:
        msg: 
          - "Application directory: {{ app_dir }}"
          - "Application port: {{ app_port }}"
          - "Application user: {{ app_user }}"